name: Lighthouse CI

on:
  # Active on PRs and pushes to main (see ci.yml). Lighthouse runs in one of two
  # honest modes (deployed vs dev-server) depending on whether LHCI_URL is set;
  # the concurrency group cancels superseded runs to keep Actions minutes bounded.
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: lhci-${{ github.ref }}
  cancel-in-progress: true

# Lighthouse runs in one of two HONEST modes, chosen by whether a real deployed
# URL is configured in the repository variable `LHCI_URL`:
#
#   MODE A - blocking, representative (LHCI_URL is set)
#     Audits the actual deployed SSR app at LHCI_URL and ENFORCES the budgets in
#     lighthouserc.deployed.json (assertions are "error"; the job gates merges).
#     This is the trustworthy gate: it measures what users actually get.
#     To enable: set a repo variable LHCI_URL to a deployed preview/prod URL
#     (Settings -> Secrets and variables -> Actions -> Variables).
#
#   MODE B - non-blocking smoke (LHCI_URL is empty, the default)
#     Builds the client and audits the local `bun run preview` static server.
#     That preview is NOT the SSR/edge runtime users hit, so its scores are not
#     representative enough to BLOCK merges - assertions are "warn" and the step
#     is continue-on-error. It runs purely for visibility.
#
# Either way, the always-on bundle-size budget in ci.yml is the reliable BLOCKING
# performance floor (deterministic, no browser/server required).
jobs:
  lighthouse:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.23"

      # ---- MODE A: real deployed URL configured -> blocking gate ----
      - name: Lighthouse against deployed URL (blocking)
        if: ${{ vars.LHCI_URL != '' }}
        run: bunx @lhci/cli@0.16.x autorun --config=lighthouserc.deployed.json --collect.url="${{ vars.LHCI_URL }}"

      # ---- MODE B: no deployed URL -> non-blocking local-preview smoke ----
      # See ci.yml: the committed bun.lock pins tarballs to Lovable's private GAR
      # cache; repoint to the public npm registry for CI (edit is never committed).
      - name: Repoint lockfile to the public npm registry
        if: ${{ vars.LHCI_URL == '' }}
        run: |
          sed -E -i 's#https://europe-west[0-9]+-npm\.pkg\.dev/lovable-core-prod/sandbox-npm-cache/#https://registry.npmjs.org/#g' bun.lock

      - name: Install dependencies
        if: ${{ vars.LHCI_URL == '' }}
        run: bun install
        env:
          npm_config_registry: https://registry.npmjs.org

      # No build step: the production build targets the Cloudflare edge runtime (a
      # Worker) and `vite preview` is incompatible with it, so the smoke drives the
      # app via the dev server (see lighthouserc.json startServerCommand). Scores
      # are "warn" - dev-mode numbers aren't representative enough to block - but
      # the step is NOT continue-on-error, so a broken Lighthouse setup fails
      # VISIBLY instead of silently passing. Real a11y enforcement lives in the
      # axe unit tests (ci.yml, blocking); the deployed-URL mode above is the
      # representative blocking gate for perf/a11y/SEO.
      - name: Lighthouse smoke on dev server (scores advisory; the run must succeed)
        if: ${{ vars.LHCI_URL == '' }}
        run: bunx @lhci/cli@0.16.x autorun --config=lighthouserc.json
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || 'https://placeholder.supabase.co' }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY || 'placeholder-anon-key' }}
          VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID || 'placeholder' }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL || 'https://placeholder.supabase.co' }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY || 'placeholder-anon-key' }}
