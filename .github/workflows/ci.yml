name: CI

on:
  # Active gate between merge and production. Runs on every PR and on pushes to
  # main. `vite build` does NOT typecheck (esbuild strips types), so the explicit
  # Typecheck step below is the real type gate. The concurrency group cancels
  # superseded runs, so a busy branch never spends Actions minutes on stale
  # commits. Uses GitHub-hosted ubuntu-latest runners (no self-hosted fleet
  # required); the bun.lock repoint step makes the private-registry pins
  # installable from public npm in CI.
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.23"

      # The committed bun.lock pins tarballs to Lovable's private GAR cache
      # (europe-west4-npm.pkg.dev/...), which is unreachable from public CI. The
      # path after the cache prefix is byte-identical to the npm registry layout,
      # so repointing the host keeps the exact pinned versions + integrity while
      # installing from the public registry. This edit is CI-only (never committed).
      - name: Repoint lockfile to the public npm registry
        run: |
          sed -E -i 's#https://europe-west[0-9]+-npm\.pkg\.dev/lovable-core-prod/sandbox-npm-cache/#https://registry.npmjs.org/#g' bun.lock

      - name: Install dependencies
        run: bun install
        env:
          npm_config_registry: https://registry.npmjs.org

      - name: Typecheck
        run: bunx tsc --noEmit

      # Tests run WITH the coverage gate so the per-file thresholds in
      # vitest.config.ts actually block merges (previously CI ran plain
      # `vitest run`, so the gate was local-only and could silently rot).
      - name: Test + coverage gate
        run: bun run test:coverage

      - name: Build
        run: bun run build
        env:
          # Placeholders so Vite has defined VITE_* at build time; real values
          # come from project secrets in deploy environments.
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || 'https://placeholder.supabase.co' }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY || 'placeholder-anon-key' }}
          VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID || 'placeholder' }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL || 'https://placeholder.supabase.co' }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY || 'placeholder-anon-key' }}

      # Blocking perf gate: fails the build if the gzipped client bundle grows
      # past budget (largest chunk / total). Reliable - no server or browser
      # needed - unlike the separate Lighthouse job.
      - name: Bundle size budget
        run: bun run check:bundle

      # Blocking: the Prettier backlog was cleared (repo-wide format commit) and
      # all remaining ESLint errors were fixed, so lint now gates merges like
      # typecheck and tests.
      - name: Lint
        run: bun run lint

  # pgTAP: RLS tenant isolation, role management and full-text search run
  # against a real local Postgres (supabase db start applies migrations +
  # seed.sql). Complements Vitest, which never touches RLS policies.
  pgtap:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start local database (migrations + seed)
        run: supabase db start

      # Fresh CI database has no pgTAP; the tests expect it in `extensions`
      # (see supabase/tests/README.md).
      - name: Install pgTAP extension
        run: |
          psql "postgresql://postgres:postgres@127.0.0.1:54322/postgres" \
            -c 'create extension if not exists pgtap with schema extensions;'

      - name: Run pgTAP tests
        run: supabase test db
