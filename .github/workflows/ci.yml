name: CI

on:
  # DORMANT — this org has no GitHub Actions runners / budget, so automatic runs
  # only ever failed instantly (no runner assigned, runner_id=0). Manual-trigger
  # only, so the repo isn't permanently red and no Actions minutes are spent.
  # Run the equivalent gates LOCALLY before merging (vite build does NOT typecheck):
  #   bun run test:coverage && bunx tsc --noEmit && bun run build && bun run check:bundle
  # Re-enable in CI later by restoring:  push: { branches: [main] }  + pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.23"

      # The committed bun.lock pins tarballs to Lovable's private GAR cache
      # (europe-west4-npm.pkg.dev/...), which is unreachable from public CI. The
      # path after the cache prefix is byte-identical to the npm registry layout,
      # so repointing the host keeps the exact pinned versions + integrity while
      # installing from the public registry. This edit is CI-only (never committed).
      - name: Repoint lockfile to the public npm registry
        run: |
          sed -E -i 's#https://europe-west[0-9]+-npm\.pkg\.dev/lovable-core-prod/sandbox-npm-cache/#https://registry.npmjs.org/#g' bun.lock

      - name: Install dependencies
        run: bun install
        env:
          npm_config_registry: https://registry.npmjs.org

      - name: Typecheck
        run: bunx tsc --noEmit

      # Tests run WITH the coverage gate so the per-file thresholds in
      # vitest.config.ts actually block merges (previously CI ran plain
      # `vitest run`, so the gate was local-only and could silently rot).
      - name: Test + coverage gate
        run: bun run test:coverage

      - name: Build
        run: bun run build
        env:
          # Placeholders so Vite has defined VITE_* at build time; real values
          # come from project secrets in deploy environments.
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || 'https://placeholder.supabase.co' }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY || 'placeholder-anon-key' }}
          VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID || 'placeholder' }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL || 'https://placeholder.supabase.co' }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY || 'placeholder-anon-key' }}

      # Blocking perf gate: fails the build if the gzipped client bundle grows
      # past budget (largest chunk / total). Reliable - no server or browser
      # needed - unlike the separate Lighthouse job.
      - name: Bundle size budget
        run: bun run check:bundle

      # Lint runs for visibility only: the existing tree has a large backlog of
      # Prettier formatting findings, so it must not gate merges yet. Flip
      # continue-on-error to false once the backlog is cleared.
      - name: Lint (non-blocking)
        run: bun run lint
        continue-on-error: true
